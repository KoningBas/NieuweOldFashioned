<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cocktails op Locatie | The Old Fashioned</title>
  <meta name="description" content="Bartending en cocktailworkshops op jouw locatie, verzorgd door The Old Fashioned Rijssen. Vraag direct een offerte aan." />
  <meta property="og:title" content="Cocktails op Locatie | The Old Fashioned" />
  <meta property="og:description" content="Wij nemen de bar mee naar jouw feest, bruiloft of bedrijfsborrel — met bartenders, materialen en een cocktailmenu op maat." />
  <meta property="og:type" content="website" />
  <!-- Gegenereerd door scripts/make-og-image.mjs. Zet om naar een absolute URL
       (https://domein/OldImages/og-image.png) zodra het domein vaststaat. -->
  <meta property="og:image" content="/OldImages/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Logo van The Old Fashioned — Cocktails &amp; Bites" />
  <meta property="og:locale" content="nl_NL" />
  <meta property="og:site_name" content="The Old Fashioned" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#C8922A',
            'primary-dark': '#A57520',
            surface: '#0D0D0D',
            'surface-elevated': '#1A1410',
            gold: '#C8922A',
            'gold-light': '#E8B86D',
            muted: '#8A7A6A',
            prose: '#C4B7A6',
          },
          fontFamily: {
            heading: ['"Bodoni Moda"', 'Georgia', 'serif'],
            body: ['"Cormorant Garamond"', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 120%; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; background: #0D0D0D; color: #fff; margin: 0; overflow-x: hidden; }
    .font-heading { font-family: 'Bodoni Moda', Georgia, serif; }

    /* Nav styles live in src/shared/components/Nav.tsx */

    /* Primary button — shiny gold */
    .btn-primary {
      display: inline-block;
      border: none;
      border-radius: 4px;
      background-image: linear-gradient(325deg, #C8922A 0%, #F0C060 55%, #C8922A 90%);
      background-size: 280% auto;
      background-position: left center;
      color: #fff;
      font-weight: 500;
      box-shadow: 0px 0px 20px rgba(200,146,42,0.5), 0px 5px 5px -1px rgba(180,120,20,0.25), inset 4px 4px 8px rgba(255,220,130,0.5), inset -4px -4px 8px rgba(160,100,10,0.35);
      transition: background-position 0.7s ease;
      cursor: pointer;
    }
    .btn-primary:hover { background-position: right top; }
    .btn-primary:active { opacity: 0.9; }
    .btn-primary:focus-visible { outline: 2px solid #E8B86D; outline-offset: 2px; }

    /* Ghost button — matches homepage */
    .btn-ghost {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      transition: background 0.2s ease, color 0.2s ease;
      border: 2px solid rgba(255,255,255,0.7);
      color: #fff;
      background: transparent;
    }
    .btn-ghost:hover { background: #fff; color: #000; }
    .btn-ghost:active { opacity: 0.85; }
    .btn-ghost:focus-visible { outline: 2px solid rgba(255,255,255,0.7); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      .btn-primary, .btn-ghost { transition: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/locatie/main.tsx"></script>
</body>
</html>
