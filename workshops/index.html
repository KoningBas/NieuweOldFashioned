<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cocktailworkshops | The Old Fashioned</title>
  <meta name="description" content="Cocktailworkshop bij The Old Fashioned Rijssen. Maak twee cocktails met een bartender, vanaf 4 personen in de bar of vanaf 15 personen op locatie. Vanaf 32 euro p.p." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#C8922A',
            'primary-dark': '#A57520',
            surface: '#0D0D0D',
            'surface-elevated': '#1A1410',
            gold: '#C8922A',
            'gold-light': '#E8B86D',
            muted: '#8A7A6A',
            prose: '#C4B7A6',
          },
          fontFamily: {
            heading: ['"Bodoni Moda"', 'Georgia', 'serif'],
            body: ['"Cormorant Garamond"', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 120%; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; background: #0D0D0D; color: #fff; margin: 0; overflow-x: hidden; }
    .font-heading { font-family: 'Bodoni Moda', Georgia, serif; }

    /* Nav hover wipe effect */
    .nav-btn {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      transition: color 0.2s ease;
    }
    .nav-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
      z-index: -1;
    }
    .nav-btn:hover::before { transform: scaleX(1); }
    .nav-btn:active { opacity: 0.8; }
    .nav-btn:focus-visible { outline: 2px solid rgba(255,255,255,0.6); outline-offset: 2px; }

    /* Primary button — shiny gold */
    .btn-primary {
      display: inline-block;
      border: none;
      border-radius: 4px;
      background-image: linear-gradient(325deg, #C8922A 0%, #F0C060 55%, #C8922A 90%);
      background-size: 280% auto;
      background-position: left center;
      color: #fff;
      font-weight: 500;
      box-shadow: 0px 0px 20px rgba(200,146,42,0.5), 0px 5px 5px -1px rgba(180,120,20,0.25), inset 4px 4px 8px rgba(255,220,130,0.5), inset -4px -4px 8px rgba(160,100,10,0.35);
      transition: background-position 0.7s ease;
      cursor: pointer;
    }
    .btn-primary:hover { background-position: right top; }
    .btn-primary:active { opacity: 0.9; }
    .btn-primary:focus-visible { outline: 2px solid #E8B86D; outline-offset: 2px; }

    /* Ghost button — matches homepage */
    .btn-ghost {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      transition: background 0.2s ease, color 0.2s ease;
      border: 2px solid rgba(255,255,255,0.7);
      color: #fff;
      background: transparent;
    }
    .btn-ghost:hover { background: #fff; color: #000; }
    .btn-ghost:active { opacity: 0.85; }
    .btn-ghost:focus-visible { outline: 2px solid rgba(255,255,255,0.7); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      .btn-primary, .btn-ghost { transition: none; }
    }

    /* Nav scroll */
    header.scrolled .nav-inner {
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Mobile menu */
    #mobile-menu { transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    #mobile-menu.open { transform: translateX(0); }
    #mobile-menu a:focus-visible { outline: 2px solid #C8922A; outline-offset: 2px; }

    /* Backdrop */
    #mobile-backdrop { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    #mobile-backdrop.open { opacity: 1; pointer-events: auto; }

    /* Hamburger bars */
    .hb-bar { display: block; width: 22px; height: 2.2px; background: #fff; border-radius: 1px; transform-origin: center; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease; }
    #hamburger.open .hb-top { transform: translateY(7px) rotate(45deg); }
    #hamburger.open .hb-mid { opacity: 0; transform: scaleX(0); }
    #hamburger.open .hb-bot { transform: translateY(-7px) rotate(-45deg); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/workshops/main.tsx"></script>
</body>
</html>
